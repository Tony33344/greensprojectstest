<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1440px; height: 900px; overflow: hidden;
    background: #020817;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, rgba(34,197,94,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    position: relative; z-index: 10;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    border: 1px solid #1e293b;
    border-radius: 24px;
    padding: 60px 72px;
    max-width: 860px;
    width: 100%;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 40px 80px rgba(0,0,0,0.6);
  }
  .cat-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #22c55e18;
    color: #22c55e;
    border: 1px solid #22c55e40;
    border-radius: 20px;
    padding: 5px 14px; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 28px;
  }
  .cat-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
  h1 {
    font-size: 42px; font-weight: 700; color: #f8fafc;
    line-height: 1.15; margin-bottom: 14px; letter-spacing: -0.02em;
  }
  .tagline {
    font-size: 18px; color: #94a3b8; margin-bottom: 36px;
    line-height: 1.5; font-weight: 400;
  }
  .divider { height: 1px; background: #1e293b; margin-bottom: 32px; }
  .tech-label { font-size: 11px; color: #475569; text-transform: uppercase;
    letter-spacing: 0.1em; font-weight: 600; margin-bottom: 14px; }
  .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; }
  .footer { display: flex; align-items: center; justify-content: space-between; }
  .status {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #60a5fa; font-weight: 500;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #60a5fa;
    box-shadow: 0 0 6px #60a5fa;
  }
  .brand {
    font-size: 13px; color: #334155; font-weight: 500; letter-spacing: 0.05em;
  }
  .brand span { color: #22c55e; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="card">
  <div class="cat-badge"><div class="cat-dot"></div>Web Development</div>
  <h1>Plesni Studio S</h1>
  <p class="tagline">Dance Studio Management — Maribor</p>
  <div class="divider"></div>
  <div class="tech-label">Tech Stack</div>
  <div class="badges"><span style="background:#1e293b;color:#94a3b8;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid #334155;">React</span><span style="background:#1e293b;color:#94a3b8;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid #334155;">TypeScript</span><span style="background:#1e293b;color:#94a3b8;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid #334155;">TailwindCSS</span><span style="background:#1e293b;color:#94a3b8;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid #334155;">Vite</span></div>
  <div class="footer">
    <div class="status"><div class="status-dot"></div>Complete</div>
    <div class="brand">GREEN<span>SPIRIT</span> IT Solutions</div>
  </div>
</div>
</body>
</html>
